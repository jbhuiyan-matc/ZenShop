services:
  zenshop-postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: zenshop
      POSTGRES_PASSWORD: Dog-Loyal-Apple-78
      POSTGRES_DB: zenshop
    volumes:
      - zenshop-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenshop"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
  zenshop-redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - zenshop-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  zenshop-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - 3001:3001
    environment:
      - DATABASE_URL=postgresql://zenshop:Dog-Loyal-Apple-78@zenshop-postgres:5432/zenshop
      - REDIS_URL=redis://zenshop-redis:6379
      - PORT=3001
      - NODE_ENV=production
      - FRONTEND_URL=https://matcsecdesignc.com
      - JWT_SECRET=9jPtzsfXBCVN73aZKgoxvjCJ97PIm/ppaX8e3KcqTE0=
      - SESSION_SECRET=D0EMs0AhQCHOdop0d4cqSKnSnRlzP93ihT02zP9foo0=
      - AUTHENTIK_CLIENT_ID=WQrlRR3R36UW3ZxV3tRyJbPP7nLS3xbjiddU2WYg
      - AUTHENTIK_CLIENT_SECRET=ug47PVaAbS0IVkaQx9zK1hI24ObYvByV7x8ckoF3pkZu9VODwMj2pZbIPNZnDssTdc5FTNgsoUEKcpQlS13VYGRauBpEeHz9pu11VCOxcTVCX7mzYKX9pKS3EQPA1E3Z
      - AUTHENTIK_ISSUER=https://auth.matcsecdesignc.com/application/o/zenshop
      - AUTHENTIK_CALLBACK_URL=https://matcsecdesignc.com/auth/callback
      - AUTHENTIK_LOGOUT_URL=https://auth.matcsecdesignc.com/application/o/zenshop/end-session/
    depends_on:
      zenshop-postgres:
        condition: service_healthy
      zenshop-redis:
