services:
  zenshop-postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: zenshop
      POSTGRES_PASSWORD: Dog-Loyal-Apple-78
      POSTGRES_DB: zenshop
    volumes:
      - zenshop-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenshop"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      
  zenshop-redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - zenshop-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  zenshop-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - 5000:5000
    environment:
      - DATABASE_URL=postgresql://zenshop:Dog-Loyal-Apple-78@zenshop-postgres:5432/zenshop
      - REDIS_URL=redis://zenshop-redis:6379
      - PORT=5000
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET=supersecretjwtkeyforzenshop
    depends_on:
      zenshop-postgres:
        condition: service_healthy
      zenshop-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  zenshop-data:
  zenshop-redis-data:
